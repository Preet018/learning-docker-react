name: Deploy Frontend
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t preet1018/react-test -f Dockerfile.dev .

      - name: Run tests
        run: docker run -e CI=true preet1018/react-test npm test

